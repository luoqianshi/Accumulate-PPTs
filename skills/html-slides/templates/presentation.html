<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演示文稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000000;
  --text: #ffffff;
  --title: #b98eff;
  --accent: #ffc402;
  --dim: #888888;
  --card-bg: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.08);
  --dark-card: #111111;
  --border: #222222;
  --radius: 16px;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  cursor: default;
  user-select: none;
}

/* ═══════════ SLIDE ENGINE ═══════════ */
.deck {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5vh 7vw;
  background: var(--bg);
  opacity: 0;
  visibility: hidden;
  transform: translateY(60px) scale(0.97);
  transition: opacity 0.6s cubic-bezier(.4,0,.2,1),
              transform 0.6s cubic-bezier(.4,0,.2,1),
              visibility 0.6s;
  will-change: opacity, transform;
}

.slide.active {
  opacity: 1 !important;
  visibility: visible !important;
  transform: translateY(0) scale(1) !important;
}

.slide.exit-up {
  opacity: 0;
  visibility: hidden;
  transform: translateY(-60px) scale(0.97);
}

/* ═══════════ CONTROLS ═══════════ */
.controls {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 100;
  background: rgba(17,17,17,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 20px;
}

.controls button {
  background: none;
  border: none;
  color: #cccccc;
  font-size: 18px;
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.2s, color 0.2s;
}
.controls button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.controls button:disabled { opacity: 0.25; cursor: default; }
.controls button:disabled:hover { background: none; }

.controls .counter {
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  min-width: 52px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

/* Progress Bar */
.progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--title), var(--accent));
  z-index: 100;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  border-radius: 0 1px 1px 0;
}

/* Slide Dots */
.dots {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.dot.active {
  background: var(--title);
  transform: scale(1.6);
}
.dot:hover { background: #666; }

.hint {
  position: fixed;
  bottom: 86px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #444;
  z-index: 90;
  opacity: 1;
  transition: opacity 1s;
  pointer-events: none;
}
.hint.hidden { opacity: 0; }

/* ═══════════ TYPOGRAPHY ═══════════ */
.slide-label {
  font-size: clamp(11px, 1.1vw, 14px);
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 12px;
}

h1 {
  font-size: clamp(32px, 4.5vw, 58px);
  font-weight: 800;
  line-height: 1.15;
  color: var(--text);
  letter-spacing: -1.5px;
}
h1 .highlight { color: var(--title); }
h1 .accent { color: var(--accent); }

h2 {
  font-size: clamp(26px, 3.2vw, 44px);
  font-weight: 700;
  line-height: 1.25;
  color: var(--title);
  letter-spacing: -1px;
}

h3 {
  font-size: clamp(16px, 1.7vw, 24px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.subtitle {
  font-size: clamp(16px, 1.7vw, 22px);
  font-weight: 400;
  color: #cccccc;
  line-height: 1.55;
  margin-top: 16px;
  max-width: 720px;
}

.body-text {
  font-size: clamp(15px, 1.5vw, 20px);
  font-weight: 400;
  color: #cccccc;
  line-height: 1.65;
}

.small-text {
  font-size: clamp(12px, 1.1vw, 15px);
  color: var(--dim);
  line-height: 1.5;
}

/* ═══════════ COMPONENTS ═══════════ */
.divider {
  width: 48px;
  height: 3px;
  background: var(--title);
  border-radius: 2px;
  margin: 16px 0;
}
.divider-accent { background: var(--accent); }

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(185,142,255,0.10);
  border: 1px solid rgba(185,142,255,0.18);
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.06em;
  margin-bottom: 40px;
  text-transform: uppercase;
  width: fit-content;
}
.badge .dot-yellow {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}
.badge .dot-gray {
  width: 4px; height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  flex-shrink: 0;
}

/* Cards */
.card-grid {
  display: grid;
  gap: 16px;
  margin-top: 24px;
  flex: 0;
}
.card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.card-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.card {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: clamp(18px, 2.2vw, 32px);
  display: flex;
  flex-direction: column;
}
.card .card-num {
  font-size: clamp(32px, 3.5vw, 48px);
  font-weight: 800;
  color: var(--title);
  opacity: 0.3;
  line-height: 1;
  margin-bottom: 8px;
}
.card h3 { font-size: clamp(15px, 1.6vw, 22px); margin-bottom: 8px; }
.card .body-text { font-size: clamp(13px, 1.3vw, 17px); }

/* Quote Block */
.quote-block {
  border-left: 3px solid var(--accent);
  padding: 16px 24px;
  background: rgba(255, 196, 2, 0.04);
  border-radius: 0 12px 12px 0;
  margin: 16px 0;
}
.quote-block p {
  font-size: clamp(15px, 1.5vw, 20px);
  font-weight: 500;
  color: var(--accent);
  line-height: 1.6;
  font-style: italic;
}

/* VS Dialog */
.vs-row {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  margin-top: 16px;
}
.vs-col {
  flex: 1;
  border-radius: 18px;
  padding: clamp(16px, 1.8vw, 24px);
  display: flex;
  flex-direction: column;
  position: relative;
}
.vs-col.left-col {
  background: #1a1a1a;
  border: 1px solid #333;
}
.vs-col.right-col {
  background: linear-gradient(135deg, rgba(185,142,255,0.1), rgba(185,142,255,0.03));
  border: 1px solid rgba(185,142,255,0.35);
}
.vs-col .vs-tag {
  display: inline-block;
  font-size: clamp(10px, 0.9vw, 12px);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 6px;
  margin-bottom: 14px;
  width: fit-content;
}
.vs-col.left-col .vs-tag {
  background: rgba(255,255,255,0.08);
  color: var(--dim);
}
.vs-col.right-col .vs-tag {
  background: rgba(185,142,255,0.15);
  color: var(--title);
}
.vs-col .vs-icon { font-size: clamp(24px, 2.8vw, 36px); margin-bottom: 6px; }
.vs-col h3 { font-size: clamp(16px, 1.6vw, 22px); margin-bottom: 10px; }
.vs-col ul { list-style: none; padding: 0; }
.vs-col ul li {
  font-size: clamp(13px, 1.2vw, 16px);
  color: #cccccc;
  line-height: 1.55;
  padding: 3px 0 3px 22px;
  position: relative;
}
.vs-col ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 11px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.vs-col.left-col ul li::before { background: #555; }
.vs-col.right-col ul li::before { background: var(--title); }

/* Steps */
.steps {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  align-items: stretch;
}
.step {
  flex: 1;
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: clamp(16px, 2vw, 28px) clamp(12px, 1.5vw, 24px);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.step .step-num {
  font-size: clamp(10px, 0.9vw, 14px);
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.step .step-icon { font-size: clamp(22px, 2.5vw, 32px); margin-bottom: 8px; }
.step h3 { font-size: clamp(14px, 1.3vw, 18px); margin-bottom: 4px; }
.step-arrow {
  display: flex;
  align-items: center;
  font-size: 18px;
  color: #333;
}

/* Prompt Box */
.prompt-box {
  background: #0a0a0a;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: clamp(16px, 2vw, 24px) clamp(18px, 2.2vw, 28px);
  margin-top: 16px;
}
.prompt-box .prompt-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.prompt-box p {
  font-size: clamp(14px, 1.4vw, 18px);
  color: #cccccc;
  line-height: 1.65;
}
.prompt-box p em {
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

/* Highlight Bar */
.highlight-bar {
  background: linear-gradient(135deg, rgba(185,142,255,0.12), rgba(185,142,255,0.04));
  border: 1px solid rgba(185,142,255,0.2);
  border-radius: 12px;
  padding: clamp(14px, 1.8vw, 22px) clamp(18px, 2.2vw, 28px);
  margin-top: 14px;
}
.highlight-bar p {
  font-size: clamp(15px, 1.5vw, 19px);
  color: var(--text);
  line-height: 1.6;
}
.highlight-bar .accent-word {
  color: var(--accent);
  font-weight: 600;
}

/* Bullet List */
.bullet-list {
  list-style: none;
  padding: 0;
  margin-top: 12px;
}
.bullet-list li {
  font-size: clamp(14px, 1.4vw, 19px);
  color: #cccccc;
  line-height: 1.7;
  padding: 4px 0 4px 22px;
  position: relative;
}
.bullet-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 13px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--title);
}
.bullet-list li .em {
  color: var(--accent);
  font-weight: 500;
}

/* Glow */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.08;
  pointer-events: none;
}
.glow-purple { background: var(--title); }
.glow-yellow { background: var(--accent); }

/* Cover Meta */
.cover-meta {
  margin-top: 32px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.cover-tag {
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 500;
  color: var(--dim);
  background: var(--dark-card);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 100px;
}

/* Icon Row */
.icon-row {
  display: flex;
  gap: 24px;
  margin-top: 14px;
}
.icon-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(13px, 1.2vw, 17px);
  color: #cccccc;
}
.icon-item span:first-child { font-size: clamp(18px, 2vw, 24px); }

/* Big Num */
.big-num {
  font-size: 120px;
  font-weight: 900;
  color: var(--title);
  opacity: 0.12;
  position: absolute;
  top: 40px;
  right: 60px;
  line-height: 1;
}

/* End Card */
.end-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.end-card h2 {
  font-size: clamp(30px, 3.5vw, 50px);
  margin-bottom: 12px;
}

/* IPO Flow */
.ipo-flow {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 32px;
  justify-content: center;
  flex-wrap: wrap;
}
.ipo-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  min-width: 140px;
}
.ipo-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  border: 2px solid;
}
.ipo-circle.i { border-color: var(--title); color: var(--title); background: rgba(185,142,255,0.08); }
.ipo-circle.p { border-color: var(--accent); color: var(--accent); background: rgba(255,196,2,0.06); }
.ipo-circle.o { border-color: #5cffb1; color: #5cffb1; background: rgba(92,255,177,0.06); }
.ipo-label {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.ipo-desc {
  font-size: 13px;
  color: var(--dim);
  text-align: center;
  max-width: 140px;
}
.ipo-arrow {
  font-size: 24px;
  color: var(--dim);
}

/* ═══════════ ANIMATIONS ═══════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide.active .anim { animation: fadeUp 0.5s ease both; }
.slide.active .anim:nth-child(1) { animation-delay: 0.08s; }
.slide.active .anim:nth-child(2) { animation-delay: 0.16s; }
.slide.active .anim:nth-child(3) { animation-delay: 0.24s; }
.slide.active .anim:nth-child(4) { animation-delay: 0.32s; }
.slide.active .anim:nth-child(5) { animation-delay: 0.40s; }
.slide.active .anim:nth-child(6) { animation-delay: 0.48s; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 900px) {
  .slide { padding: 4vh 5vw; }
  .card-grid.cols-2, .card-grid.cols-3 { grid-template-columns: 1fr; }
  .vs-row { flex-direction: column; gap: 12px; }
  .steps { flex-direction: column; }
  .dots { display: none; }
  .ipo-flow { flex-direction: column; }
  .ipo-arrow { transform: rotate(90deg); }
}
</style>
</head>

</div><!-- /deck -->

<!-- ═══════════ NAVIGATION ═══════════ -->
<div class="controls">
  <button id="prevBtn" title="上一页">‹</button>
  <span class="counter" id="counter">01 / 01</span>
  <button id="nextBtn" title="下一页">›</button>
</div>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;

  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progress = document.getElementById('progress');
  const dotsWrap = document.getElementById('dots');
  const hint = document.getElementById('hint');

  // Build dots
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
  }
  const dots = dotsWrap.querySelectorAll('.dot');

  function pad(n) { return String(n).padStart(2, '0'); }

  function goTo(idx) {
    if (idx < 0 || idx >= total || idx === current) return;
    const prev = slides[current];
    const next = slides[idx];

    prev.classList.remove('active');
    prev.classList.add('exit-up');

    requestAnimationFrame(() => {
      next.classList.remove('exit-up');
      next.classList.add('active');
    });

    setTimeout(() => {
      prev.classList.remove('exit-up');
    }, 700);

    dots[current].classList.remove('active');
    current = idx;
    dots[current].classList.add('active');
    counter.textContent = pad(current + 1) + ' / ' + pad(total);
    progress.style.width = ((current + 1) / total * 100) + '%';
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  slides[0].classList.add('active');
  prevBtn.disabled = true;
  progress.style.width = (1 / total * 100) + '%';

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(total - 1); }
  });

  // Touch / swipe
  let touchX = 0, touchY = 0;
  document.addEventListener('touchstart', (e) => {
    touchX = e.changedTouches[0].screenX;
    touchY = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchX;
    const dy = e.changedTouches[0].screenY - touchY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      dx < 0 ? next() : prev();
    }
  }, { passive: true });

  function hideHint() { hint.classList.add('hidden'); }
  document.addEventListener('keydown', hideHint, { once: true });
  document.addEventListener('click', hideHint, { once: true });
  setTimeout(() => hideHint(), 5000);
})();
</script>

</body>
</html>
